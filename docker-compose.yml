services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metadata_crawl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      MC_DB_HOST: db
      MC_DB_PORT: 5432
      MC_DB_NAME: metadata_crawl
      MC_DB_USER: postgres
      MC_DB_PASSWORD: postgres
      MC_NCBI_EMAIL: ${NCBI_EMAIL:-user@example.com}
      MC_NCBI_API_KEY: ${NCBI_API_KEY:-}
    volumes:
      - pipeline_data:/app/data

volumes:
  pgdata:
  pipeline_data:
